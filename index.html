<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Realistic Snake with Ranking System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            background-color: #1b2414;
            color: #f0f4ee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        #ui-container {
            text-align: center;
            margin-bottom: 8px;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.6rem;
            color: #92b988;
            margin-bottom: 4px;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
        }

        #stats-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid #3b4d2f;
            font-size: 0.95rem;
            font-weight: bold;
        }

        #rank-display {
            color: #ffca28;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            margin: 5px 0;
        }

        canvas {
            background-color: #25331c;
            border: 5px solid #3b4d2f;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: block;
            width: 100%;
            height: auto;
        }

        #dpad {
            display: grid;
            grid-template-columns: repeat(3, 65px);
            grid-template-rows: repeat(3, 65px);
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
            width: 100%;
        }

        .arrow-btn {
            background: linear-gradient(135deg, #3b4d2f, #293620);
            border: 2px solid #577046;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 0 #182113;
        }

        .arrow-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #182113;
            background: #4a613b;
        }

        #screen-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(12, 18, 9, 0.95);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            text-align: center;
            padding: 20px;
        }

        #screen-overlay h2 {
            font-size: 1.8rem;
            color: #ff5252;
            margin-bottom: 5px;
        }

        .action-btn {
            padding: 12px 30px;
            font-size: 1rem;
            background-color: #6d875a;
            color: #151c10;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 0 #465839;
        }

        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #465839;
        }
    </style>
</head>

<body>

<div id="ui-container">
    <h1>Serpent Hunt</h1>
    <div id="stats-bar">
        <div>Size: <span id="score-val">3</span></div>
        <div>Rank: <span id="rank-display">Garter Snake</span></div>
    </div>

    <!-- ✅ PAUSE BUTTON (ONLY ADDITION) -->
    <button id="pause-btn" class="action-btn" style="margin-top:10px;">Pause</button>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="screen-overlay">
        <h2>Game Over</h2>
        <div id="final-rank"></div>
        <button class="action-btn" onclick="resetGame()">Respawn</button>
    </div>
</div>

<div id="dpad">
    <button class="arrow-btn" id="up-btn">↑</button>
    <button class="arrow-btn" id="left-btn">←</button>
    <button class="arrow-btn" id="right-btn">→</button>
    <button class="arrow-btn" id="down-btn">↓</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreVal = document.getElementById("score-val");
const rankDisplay = document.getElementById("rank-display");
const finalRank = document.getElementById("final-rank");
const overlay = document.getElementById("screen-overlay");

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake = [];
let food = { x: 0, y: 0 };
let dx = gridSize;
let dy = 0;
let gameInterval;
let changingDirection = false;
let currentRank = "Garter Snake";

/* ✅ ONLY ADDITION */
let isPaused = false;

document.getElementById("pause-btn").addEventListener("click", () => {
    isPaused = !isPaused;
    document.getElementById("pause-btn").innerText =
        isPaused ? "Resume" : "Pause";
});

function sendDirection(dir) {
    if (changingDirection) return;

    const goingUp = dy === -gridSize;
    const goingDown = dy === gridSize;
    const goingRight = dx === gridSize;
    const goingLeft = dx === -gridSize;

    if (dir === 'L' && !goingRight) { dx = -gridSize; dy = 0; changingDirection = true; }
    if (dir === 'U' && !goingDown) { dx = 0; dy = -gridSize; changingDirection = true; }
    if (dir === 'R' && !goingLeft) { dx = gridSize; dy = 0; changingDirection = true; }
    if (dir === 'D' && !goingUp) { dx = 0; dy = gridSize; changingDirection = true; }
}

document.addEventListener("keydown", (e) => {
    if ([37,65].includes(e.keyCode)) sendDirection('L');
    if ([38,87].includes(e.keyCode)) sendDirection('U');
    if ([39,68].includes(e.keyCode)) sendDirection('R');
    if ([40,83].includes(e.keyCode)) sendDirection('D');
});

const binds = [
    { id: "up-btn", dir: "U" },
    { id: "down-btn", dir: "D" },
    { id: "left-btn", dir: "L" },
    { id: "right-btn", dir: "R" }
];

binds.forEach(bind => {
    document.getElementById(bind.id).addEventListener("click", () => sendDirection(bind.dir));
});

resetGame();

function main() {

    /* ✅ ONLY PAUSE CHECK ADDED */
    if (isPaused) return;

    if (hasGameEnded()) {
        finalRank.innerText = `Final Rank: ${currentRank} (Size: ${snake.length})`;
        overlay.style.display = "flex";
        clearInterval(gameInterval);
        return;
    }

    changingDirection = false;
    drawMap();
    drawFood();
    moveSnake();
    drawSnake();
}

function drawMap() {
    ctx.fillStyle = "#25331c";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.fillStyle = "#1f2b18";
    for(let i = 0; i < canvas.width; i += 40) {
        for(let j = 0; j < canvas.height; j += 40) {
            if((i+j) % 80 === 0) ctx.fillRect(i, j, 20, 20);
        }
    }
}

function drawSnake() {
    snake.forEach((part, index) => {
        if (index === 0) {
            let headGrad = ctx.createRadialGradient(part.x + 10, part.y + 10, 2, part.x + 10, part.y + 10, 10);
            headGrad.addColorStop(0, '#5b8c4b');
            headGrad.addColorStop(1, '#2e4425');
            ctx.fillStyle = headGrad;

            ctx.beginPath();
            ctx.ellipse(part.x + 10, part.y + 10, 10, 8, dy !== 0 ? Math.PI/2 : 0, 0, 2 * Math.PI);
            ctx.fill();

            ctx.fillStyle = "#ffeb3b";
        } else {
            let bodyGrad = ctx.createLinearGradient(part.x, part.y, part.x + gridSize, part.y + gridSize);
            bodyGrad.addColorStop(0, '#436637');
            bodyGrad.addColorStop(1, '#253a1f');

            ctx.fillStyle = bodyGrad;
            ctx.beginPath();
            ctx.arc(part.x + 10, part.y + 10, 9, 0, Math.PI * 2);
            ctx.fill();
        }
    });
}

function moveSnake() {
    const head = { x: snake[0].x + dx, y: snake[0].y + dy };
    snake.unshift(head);

    if (snake[0].x === food.x && snake[0].y === food.y) {
        scoreVal.innerText = snake.length;
        currentRank = getRank(snake.length);
        rankDisplay.innerText = currentRank;
        generateFood();
    } else {
        snake.pop();
    }
}

function drawFood() {
    let cx = food.x + gridSize / 2;
    let cy = food.y + gridSize / 2;

    ctx.fillStyle = "#d32f2f";
    ctx.beginPath();
    ctx.arc(cx, cy, 7, 0, Math.PI * 2);
    ctx.fill();
}

function generateFood() {
    food.x = Math.floor(Math.random() * tileCount) * gridSize;
    food.y = Math.floor(Math.random() * tileCount) * gridSize;
}

function hasGameEnded() {
    for (let i = 4; i < snake.length; i++) {
        if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
    }
    return snake[0].x < 0 || snake[0].x >= canvas.width ||
           snake[0].y < 0 || snake[0].y >= canvas.height;
}

function resetGame() {
    snake = [
        { x: 160, y: 200 },
        { x: 140, y: 200 },
        { x: 120, y: 200 }
    ];

    dx = gridSize;
    dy = 0;
    currentRank = getRank(snake.length);

    scoreVal.innerText = snake.length;
    rankDisplay.innerText = currentRank;

    overlay.style.display = "none";

    generateFood();

    clearInterval(gameInterval);
    gameInterval = setInterval(main, 130);
}

function getRank(size) {
    if (size < 6) return "Garter Snake 🪱";
    if (size < 12) return "Garden Viper 🐍";
    if (size < 20) return "Forest Cobra 🥷";
    if (size < 30) return "Boa Constrictor 🪵";
    if (size < 45) return "Giant Anaconda 🌊";
    return "Mythical World Serpent 🐉";
}
</script>

</body>
</html>
